title: "Analisi ChIP-seq / ATAC-seq"
subtitle: "Report Risultati Pipeline"

# Ordine delle sezioni: mettiamo tutto prima e le versioni alla fine
report_section_order:
    fastqc:
        order: -90
    trim_galore:
        order: -80
    bowtie2:
        order: -70
    samtools:
        order: -60
    picard:
        order: -50
    macs3:
        order: -40
    frip:
        order: -30
    software_versions: # Forza le versioni in fondo
        order: -10

# Rimuove i suffissi dai nomi dei campioni per leggere meglio i grafici
sample_names_replace_suffixes:
    - "_trimmed"
    - "_aligned"
    - ".sorted"
    - "_peaks"
    - ".summary"

# Nasconde i percorsi locali dei file
show_analysis_paths: false
